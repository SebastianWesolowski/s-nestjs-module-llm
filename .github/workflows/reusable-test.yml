name: Test

on:
  workflow_call:
    inputs:
      cache_keys:
        description: 'The cache key suffix'
        required: false
        type: string
        default: ''
      e2e_tests:
        description: 'Whether to run E2E tests'
        required: false
        type: boolean
        default: false
      install_args:
        description: 'Arguments for yarn install command'
        required: false
        type: string
        default: '--frozen-lockfile'
      install_deps:
        description: 'Whether dependencies were installed'
        required: false
        type: string
        default: false
      install_playwright:
        description: 'Whether to install Playwright browsers'
        required: false
        type: string
        default: false
      node_version:
        description: 'Node.js version to use'
        required: true
        type: string
      smoke_tests:
        description: 'Whether to run smoke tests'
        required: false
        type: boolean
        default: false
      storybook_build:
        description: 'Whether to build Storybook'
        required: false
        type: boolean
        default: false
      test_matrix:
        description: 'JSON string for test matrix configuration'
        required: false
        type: string
        default: '{"browser": ["chromium"]}'
      unit_tests:
        description: 'Whether to run unit tests'
        required: false
        type: boolean
        default: true
      upload_artifacts:
        description: 'Whether to upload test artifacts'
        required: false
        type: boolean
        default: true
      # Parametr typu wydania
      release_type_detected:
        description: 'Type of release detected (production, preprod, prerelease, feature)'
        required: false
        type: string
        default: 'prerelease'
      # Informacja o wyniku poprzedniego kroku
      prev_step_result:
        description: 'Result of the previous step'
        required: false
        type: string
        default: 'success'
    outputs:
      test_summary:
        description: 'Summary of test results'
        value: ${{ jobs.test.outputs.test_summary }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.test_matrix) }}
    outputs:
      test_summary: ${{ steps.summary.outputs.test_summary }}

    steps:
      - name: 🔍 inputs
        id: check_inputs
        run: |
          echo "Debugowanie inputów workflow:"
          echo "cache_keys: ${{ inputs.cache_keys }}"
          echo "e2e_tests: ${{ inputs.e2e_tests }}"
          echo "install_args: ${{ inputs.install_args }}"
          echo "install_deps: ${{ inputs.install_deps }}"
          echo "install_playwright: ${{ inputs.install_playwright }}"
          echo "node_version: ${{ inputs.node_version }}"
          echo "smoke_tests: ${{ inputs.smoke_tests }}"
          echo "storybook_build: ${{ inputs.storybook_build }}"
          echo "test_matrix: ${{ inputs.test_matrix }}"
          echo "unit_tests: ${{ inputs.unit_tests }}"
          echo "upload_artifacts: ${{ inputs.upload_artifacts }}"
          echo "release_type_detected: ${{ inputs.release_type_detected }}"
          echo "prev_step_result: ${{ inputs.prev_step_result }}"

          echo "Parsed cache keys:"
          echo "test_key: ${{ fromJSON(inputs.cache_keys).test_key }}"
          echo "deps_key: ${{ fromJSON(inputs.cache_keys).deps_key }}"

          # Sprawdzenie czy należy wykonać testy na podstawie typu release
          RUN_TEST="true"
          REASON=""

          # Jeśli poprzedni krok nie powiódł się, sprawdź czy powinniśmy kontynuować
          if [[ "${{ inputs.prev_step_result }}" != "success" && "${{ inputs.prev_step_result }}" != "" ]]; then
            echo "Previous step failed: ${{ inputs.prev_step_result }}"

            # Dla feature i prerelease wymagamy, aby poprzedni krok się powiódł
            if [[ "${{ inputs.release_type_detected }}" == "feature" || "${{ inputs.release_type_detected }}" == "prerelease" ]]; then
              RUN_TEST="false"
              REASON="Previous step failed, skipping tests for non-production release"
            fi
          fi

          # Jeśli pierwszy warunek pozwala na wykonanie testów, sprawdź typ wydania
          if [[ "$RUN_TEST" == "true" ]]; then
            case "${{ inputs.release_type_detected }}" in
              "production")
                # Dla produkcyjnych releasów wykonujemy tylko testy jednostkowe
                RUN_TEST="true"
                REASON="Production release detected, running only unit tests"
                # Ustawienie flag testów
                echo "run_unit_tests=true" >> $GITHUB_OUTPUT
                echo "run_e2e_tests=false" >> $GITHUB_OUTPUT
                echo "run_smoke_tests=false" >> $GITHUB_OUTPUT
                echo "build_storybook=false" >> $GITHUB_OUTPUT
                ;;
              "preprod")
                # Dla pre-produkcyjnych releasów wykonujemy wszystkie testy
                RUN_TEST="true"
                REASON="Pre-production release detected, running all tests"
                # Ustawienie flag testów
                echo "run_unit_tests=${{ inputs.unit_tests }}" >> $GITHUB_OUTPUT
                echo "run_e2e_tests=${{ inputs.e2e_tests }}" >> $GITHUB_OUTPUT
                echo "run_smoke_tests=${{ inputs.smoke_tests }}" >> $GITHUB_OUTPUT
                echo "build_storybook=${{ inputs.storybook_build }}" >> $GITHUB_OUTPUT
                ;;
              "prerelease"|"feature")
                # Dla pre-release i feature wykonujemy tylko testy jednostkowe i smoke
                RUN_TEST="true"
                REASON="Pre-release/Feature detected, running unit and smoke tests"
                # Ustawienie flag testów
                echo "run_unit_tests=${{ inputs.unit_tests }}" >> $GITHUB_OUTPUT
                echo "run_e2e_tests=false" >> $GITHUB_OUTPUT
                echo "run_smoke_tests=${{ inputs.smoke_tests }}" >> $GITHUB_OUTPUT
                echo "build_storybook=${{ inputs.storybook_build }}" >> $GITHUB_OUTPUT
                ;;
              *)
                # W innych przypadkach wykonujemy wszystkie testy
                RUN_TEST="true"
                REASON="Unknown release type, running all configured tests"
                # Ustawienie flag testów
                echo "run_unit_tests=${{ inputs.unit_tests }}" >> $GITHUB_OUTPUT
                echo "run_e2e_tests=${{ inputs.e2e_tests }}" >> $GITHUB_OUTPUT
                echo "run_smoke_tests=${{ inputs.smoke_tests }}" >> $GITHUB_OUTPUT
                echo "build_storybook=${{ inputs.storybook_build }}" >> $GITHUB_OUTPUT
                ;;
            esac
          else
            # Jeśli nie wykonujemy testów, ustaw wszystkie flagi na false
            echo "run_unit_tests=false" >> $GITHUB_OUTPUT
            echo "run_e2e_tests=false" >> $GITHUB_OUTPUT
            echo "run_smoke_tests=false" >> $GITHUB_OUTPUT
            echo "build_storybook=false" >> $GITHUB_OUTPUT
          fi

          echo "run_test=${RUN_TEST}" >> $GITHUB_OUTPUT
          echo "reason=${REASON}" >> $GITHUB_OUTPUT

      - name: 📝 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
        if: steps.check_inputs.outputs.run_test == 'true'

      - name: ⚡ Cache test
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ${{ github.workspace }}/storybook-static/
          key: ${{ fromJSON(inputs.cache_keys).test_key }}
          restore-keys: |
            ${{ fromJSON(inputs.cache_keys).test_key }}
        if: steps.check_inputs.outputs.run_test == 'true'

      - name: ⚡ Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/node_modules/
          key: ${{ fromJSON(inputs.cache_keys).deps_key }}
          restore-keys: |
            ${{ fromJSON(inputs.cache_keys).deps_key }}
        if: steps.check_inputs.outputs.run_test == 'true'

      - name: 🟢 Setup Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
        if: steps.check_inputs.outputs.run_test == 'true'

      - name: 📦 Install dependencies
        if: inputs.install_deps == 'true' && steps.check_inputs.outputs.run_test == 'true'
        run: |
          yarn config set network-timeout 300000
          yarn install ${{ inputs.install_args }} --prefer-offline --no-scripts

      - name: 🎭 Install Playwright browsers
        if: inputs.install_playwright == 'true' && (steps.check_inputs.outputs.run_e2e_tests == 'true' || steps.check_inputs.outputs.run_smoke_tests == 'true') && steps.check_inputs.outputs.run_test == 'true'
        run: npx playwright install --with-deps

      - name: 🧪 Unit tests
        if: steps.check_inputs.outputs.run_unit_tests == 'true' && steps.check_inputs.outputs.run_test == 'true'
        run: yarn test:unit

      - name: 🧪 E2E tests
        if: steps.check_inputs.outputs.run_e2e_tests == 'true' && steps.check_inputs.outputs.run_test == 'true'
        run: yarn test:e2e

      - name: 🧪 Smoke tests
        if: steps.check_inputs.outputs.run_smoke_tests == 'true' && steps.check_inputs.outputs.run_test == 'true'
        run: yarn test:smoke

      - name: 📚 Build Storybook
        if: steps.check_inputs.outputs.build_storybook == 'true' && steps.check_inputs.outputs.run_test == 'true'
        run: yarn build:storybook

      - name: 📊 Upload test results
        if: always() && steps.check_inputs.outputs.run_test == 'true' && (failure() || inputs.upload_artifacts == true)
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser || 'all' }}
          path: |
            test-results/
            reports/tests/
            storybook-static/
            coverage/
            .yarn-error.log
            yarn-debug.log
            npm-debug.log
          retention-days: 7
          if-no-files-found: ignore

      - name: 📝 Summary
        id: summary
        run: |
          DETAILS=()
          if [[ "${{ steps.check_inputs.outputs.run_test }}" == "true" ]]; then
            # Wszystkie włączone testy
            [[ "${{ steps.check_inputs.outputs.run_unit_tests }}" == "true" ]] && DETAILS+=("- Unit tests")
            [[ "${{ steps.check_inputs.outputs.run_e2e_tests }}" == "true" ]] && DETAILS+=("- E2E tests")
            [[ "${{ steps.check_inputs.outputs.run_smoke_tests }}" == "true" ]] && DETAILS+=("- Smoke tests")
            [[ "${{ steps.check_inputs.outputs.build_storybook }}" == "true" ]] && DETAILS+=("- Storybook build")
          else
            # Jeśli pomijamy testy
            DETAILS+=("- Test execution skipped: ${{ steps.check_inputs.outputs.reason }}")
          fi

          # Przygotowanie podsumowania
          test_summary=$(jq -n \
            --arg title "### Wyniki testowania 🧪" \
            --arg subtitle "✅ Wykonane testy:" \
            --arg node "${{ inputs.node_version }}" \
            --arg matrix "${{ matrix.browser || 'none' }}" \
            --arg time "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg run_test "${{ steps.check_inputs.outputs.run_test }}" \
            --arg reason "${{ steps.check_inputs.outputs.reason }}" \
            --arg release_type "${{ inputs.release_type_detected }}" \
            --argjson details "$(printf '%s\n' "${DETAILS[@]}" | jq -R . | jq -s .)" \
            '{
              markdown: {
                title: $title,
                subtitle: $subtitle,
                details: $details,
                run_status: (if $run_test == "true" then "✅ Wykonano testy" else "⏭️ Pominięto testy: " + $reason end)
              },
              data: {
                executed_tests: ($details | map(sub("- "; "")) | join(",")),
                browser: $matrix,
                node_version: $node,
                timestamp: $time,
                run_test: ($run_test == "true"),
                release_type: $release_type,
                reason: $reason
              }
            }')

          # Zapisanie podsumowania do GitHub Step Summary
          {
            echo "$test_summary" | jq -r '.markdown.title'
            echo ""
            echo "$test_summary" | jq -r '.markdown.subtitle'
            echo "$test_summary" | jq -r '.markdown.details[]'
            echo ""
            echo "$test_summary" | jq -r '.markdown.run_status'
            echo ""
            echo "**Release type:** ${{ inputs.release_type_detected }}"
            echo "**Browser:** ${{ matrix.browser || 'none' }}"
          } >> $GITHUB_STEP_SUMMARY

          # Export danych do outputs
          echo "test_summary=$(echo "$test_summary" | jq -c '.')" >> $GITHUB_OUTPUT
