name: Test

on:
  workflow_call:
    inputs:
      cache_keys:
        description: 'The cache key suffix'
        required: false
        type: string
        default: ''
      e2e_tests:
        description: 'Whether to run E2E tests'
        required: false
        type: boolean
        default: false
      install_args:
        description: 'Arguments for yarn install command'
        required: false
        type: string
        default: '--frozen-lockfile'
      install_deps:
        description: 'Whether dependencies were installed'
        required: false
        type: string
        default: false
      install_playwright:
        description: 'Whether to install Playwright browsers'
        required: false
        type: string
        default: false
      node_version:
        description: 'Node.js version to use'
        required: true
        type: string
      smoke_tests:
        description: 'Whether to run smoke tests'
        required: false
        type: boolean
        default: false
      storybook_build:
        description: 'Whether to build Storybook'
        required: false
        type: boolean
        default: false
      test_matrix:
        description: 'JSON string for test matrix configuration'
        required: false
        type: string
        default: '{"browser": ["chromium"]}'
      unit_tests:
        description: 'Whether to run unit tests'
        required: false
        type: boolean
        default: true
      upload_artifacts:
        description: 'Whether to upload test artifacts'
        required: false
        type: boolean
        default: true
      # Nowe parametry dla typów wydania
      is_pre_release:
        description: 'Whether this is a pre-release (beta from develop/feature)'
        required: false
        type: boolean
        default: false
      is_preprod:
        description: 'Whether this is a pre-production release (from PR)'
        required: false
        type: boolean
        default: false
      is_production:
        description: 'Whether this is a production release (from main/master)'
        required: false
        type: boolean
        default: false
      # Informacja o wyniku poprzedniego kroku
      prev_step_result:
        description: 'Result of the previous step'
        required: false
        type: string
        default: 'success'
    outputs:
      test_summary:
        description: 'Summary of test results'
        value: ${{ jobs.test.outputs.test_summary }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.test_matrix) }}
    outputs:
      test_summary: ${{ steps.summary.outputs.test_summary }}

    steps:
      - name: 🔍 inputs
        id: check_inputs
        run: |
          echo "Debugowanie inputów workflow:"
          echo "cache_keys: ${{ inputs.cache_keys }}"
          echo "e2e_tests: ${{ inputs.e2e_tests }}"
          echo "install_args: ${{ inputs.install_args }}"
          echo "install_deps: ${{ inputs.install_deps }}"
          echo "install_playwright: ${{ inputs.install_playwright }}"
          echo "node_version: ${{ inputs.node_version }}"
          echo "smoke_tests: ${{ inputs.smoke_tests }}"
          echo "storybook_build: ${{ inputs.storybook_build }}"
          echo "test_matrix: ${{ inputs.test_matrix }}"
          echo "unit_tests: ${{ inputs.unit_tests }}"
          echo "upload_artifacts: ${{ inputs.upload_artifacts }}"
          echo "is_pre_release: ${{ inputs.is_pre_release }}"
          echo "is_preprod: ${{ inputs.is_preprod }}"
          echo "is_production: ${{ inputs.is_production }}"
          echo "prev_step_result: ${{ inputs.prev_step_result }}"

          echo "Parsed cache keys:"
          echo "test_key: ${{ fromJSON(inputs.cache_keys).test_key }}"
          echo "deps_key: ${{ fromJSON(inputs.cache_keys).deps_key }}"

          # Sprawdzenie czy należy wykonać testy na podstawie typu release i wyniku poprzedniego kroku
          RUN_TESTS="true"
          REASON=""

          if [[ "${{ inputs.is_production }}" == "true" ]]; then
            # Dla produkcyjnych releasów pomijamy testy
            RUN_TESTS="false"
            REASON="Production release detected, skipping tests"
          elif [[ "${{ inputs.is_preprod }}" == "true" ]]; then
            # Dla pre-produkcyjnych releasów pomijamy testy
            RUN_TESTS="false"
            REASON="Pre-production release detected, skipping tests"
          elif [[ "${{ inputs.is_pre_release }}" == "true" ]]; then
            # Dla pre-release wykonujemy testy, ale tylko jeśli poprzedni krok się powiódł
            if [[ "${{ inputs.prev_step_result }}" == "success" ]]; then
              RUN_TESTS="true"
              REASON="Pre-release detected, performing tests"
            else
              RUN_TESTS="false"
              REASON="Previous step failed, skipping tests"
            fi
          else
            # W innych przypadkach wykonujemy testy
            RUN_TESTS="true"
            REASON="Regular build, performing tests"
          fi

          echo "run_tests=${RUN_TESTS}" >> $GITHUB_OUTPUT
          echo "reason=${REASON}" >> $GITHUB_OUTPUT

      - name: 📝 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
        if: steps.check_inputs.outputs.run_tests == 'true'

      - name: ⚡ Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/node_modules/
          key: ${{ fromJSON(inputs.cache_keys).deps_key }}
          restore-keys: |
            ${{ fromJSON(inputs.cache_keys).deps_key }}
        if: steps.check_inputs.outputs.run_tests == 'true'

      - name: ⚡ Cache test
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ${{ github.workspace }}/storybook-static/
          key: ${{ fromJSON(inputs.cache_keys).test_key }}
          restore-keys: |
            ${{ fromJSON(inputs.cache_keys).test_key }}
        if: steps.check_inputs.outputs.run_tests == 'true'

      - name: 🟢 Setup Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
        if: steps.check_inputs.outputs.run_tests == 'true'

      - name: 🔍 Check installation requirements
        id: check-storybook-build
        if: steps.check_inputs.outputs.run_tests == 'true'
        run: |
          INSTALL_STORYBOOK="false"
          if [[ "${{ inputs.storybook_build }}" == "true" ]]; then
            if [[ ! -d "${{ github.workspace }}/storybook-static" ]]; then
              INSTALL_STORYBOOK="true"
            fi
          fi
          echo "install_storybook=${INSTALL_STORYBOOK}" >> $GITHUB_OUTPUT

      - name: 📦 Install dependencies
        if: inputs.install_deps == 'true' && steps.check_inputs.outputs.run_tests == 'true'
        run: |
          yarn config set network-timeout 300000
          yarn install ${{ inputs.install_args }} --prefer-offline --no-scripts

      - name: 🎭 Install Playwright (if needed)
        if: inputs.install_playwright == 'true' && (inputs.e2e_tests == true || inputs.smoke_tests == true) && steps.check_inputs.outputs.run_tests == 'true'
        run: yarn playwright:install

      - name: 🧪 Run unit tests
        if: inputs.unit_tests == true && steps.check_inputs.outputs.run_tests == 'true'
        run: yarn test:unit
        env:
          CI: true
          FORCE_COLOR: 1

      - name: 📚 Build Storybook
        if: steps.check-storybook-build.outputs.install_storybook == 'true' && steps.check_inputs.outputs.run_tests == 'true'
        run: yarn storybook:build

      - name: 🔥 Run smoke tests
        if: inputs.smoke_tests == true && inputs.storybook_build == true && steps.check_inputs.outputs.run_tests == 'true'
        run: |
          yarn test:smoke:ci
        env:
          FORCE_COLOR: 1

      - name: 🤖 Run E2E tests
        if: inputs.e2e_tests == true && steps.check_inputs.outputs.run_tests == 'true'
        run: yarn test:e2e
        env:
          PLAYWRIGHT_BROWSER: ${{ matrix.browser || 'chromium' }}
          FORCE_COLOR: 1

      - name: 📊 Upload test reports
        if: (failure() || inputs.upload_artifacts == true) && steps.check_inputs.outputs.run_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.browser || 'chromium' }}
          path: |
            ${{ inputs.storybook_build && 'storybook-static/' || '' }}
            playwright-report/
            reports/coverage/
          retention-days: 14

      - name: 📝 Summary
        id: summary
        run: |
          DETAILS=()
          if [[ "${{ steps.check_inputs.outputs.run_tests }}" == "true" ]]; then
            # Wszystkie włączone testy
            [[ "${{ inputs.unit_tests }}" == "true" ]] && DETAILS+=("- Unit tests with Node.js ${{ inputs.node_version }}")
            [[ "${{ inputs.smoke_tests }}" == "true" && "${{ inputs.storybook_build }}" == "true" ]] && DETAILS+=("- Smoke tests")
            [[ "${{ inputs.e2e_tests }}" == "true" ]] && DETAILS+=("- E2E tests with ${{ matrix.browser || 'chromium' }}")
          else
            # Jeśli pomijamy testy
            DETAILS+=("- Tests skipped: ${{ steps.check_inputs.outputs.reason }}")
          fi

          # Przygotowanie podsumowania
          test_summary=$(jq -n \
            --arg title "### Wyniki testów 📊" \
            --arg subtitle "Wykonane testy:" \
            --arg node "${{ inputs.node_version }}" \
            --arg browser "${PLAYWRIGHT_BROWSER:-chromium}" \
            --arg time "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg run_tests "${{ steps.check_inputs.outputs.run_tests }}" \
            --arg reason "${{ steps.check_inputs.outputs.reason }}" \
            --argjson details "$(printf '%s\n' "${DETAILS[@]}" | jq -R . | jq -s .)" \
            '{
              markdown: {
                title: $title,
                subtitle: $subtitle,
                details: $details,
                run_status: (if $run_tests == "true" then "✅ Wykonano testy" else "⏭️ Pominięto testy: " + $reason end)
              },
              data: {
                unit_tests: ${{ inputs.unit_tests }},
                smoke_tests: ${{ inputs.smoke_tests }},
                e2e_tests: ${{ inputs.e2e_tests }},
                storybook_built: ${{ inputs.storybook_build }},
                browser: $browser,
                node_version: $node,
                timestamp: $time,
                run_tests: ($run_tests == "true"),
                is_pre_release: ${{ inputs.is_pre_release }},
                is_preprod: ${{ inputs.is_preprod }},
                is_production: ${{ inputs.is_production }},
                prev_step_result: "${{ inputs.prev_step_result }}",
                reason: $reason
              }
            }')

          # Zapisanie podsumowania do GitHub Step Summary
          {
            echo "$test_summary" | jq -r '.markdown.title'
            echo ""

            if [[ "${{ steps.check_inputs.outputs.run_tests }}" == "true" ]]; then
              echo "$test_summary" | jq -r '.markdown.subtitle'
              echo "$test_summary" | jq -r '.markdown.details[]'
            else
              echo "$test_summary" | jq -r '.markdown.run_status'
            fi
          } >> $GITHUB_STEP_SUMMARY

          # Export danych do outputs
          echo "test_summary=$(echo "$test_summary" | jq -c '.')" >> $GITHUB_OUTPUT
